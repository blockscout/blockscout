version: '3.9'

networks:
  hanzo-network:
    external: true

services:
  backend:
    image: ghcr.io/luxfi/explorer:${DOCKER_TAG:-latest}
    container_name: 'luxtest-backend'
    restart: always
    stop_grace_period: 5m
    command: "bin/blockscout start"
    networks:
      - hanzo-network
    ports:
      - "4010:4000"
    extra_hosts:
      - "k8s-host:192.168.1.99"
      - "host-postgres:192.168.1.99"
      - "host-redis:192.168.1.99"
    env_file:
      - ./docker-compose/envs/common-blockscout.env
    environment:
      ETHEREUM_JSONRPC_HTTP_URL: http://k8s-host:9650/ext/bc/2sdADEgBC3NjLM4inKc1hY1PQpCT3JVyGVJxdmcq6sqrDndjFG/rpc
      ETHEREUM_JSONRPC_TRACE_URL: http://k8s-host:9650/ext/bc/2sdADEgBC3NjLM4inKc1hY1PQpCT3JVyGVJxdmcq6sqrDndjFG/rpc
      ETHEREUM_JSONRPC_WS_URL: ws://k8s-host:9650/ext/bc/2sdADEgBC3NjLM4inKc1hY1PQpCT3JVyGVJxdmcq6sqrDndjFG/ws
      CHAIN_ID: '96368'
      DATABASE_URL: postgresql://blockscout:ceWb1MeLBEeOIfk65gU8EjF8@host-postgres:5432/explorer_luxtest?sslmode=disable
      DISABLE_MIGRATE: 'true'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.luxtest-backend.rule=Host(`api-explore-testnet.lux.network`)"
      - "traefik.http.routers.luxtest-backend.entrypoints=websecure"
      - "traefik.http.routers.luxtest-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.luxtest-backend.loadbalancer.server.port=4000"
      - "traefik.docker.network=hanzo-network"

  stats:
    image: ghcr.io/luxfi/explorer-stats:${STATS_VERSION:-latest}
    container_name: 'luxtest-stats'
    restart: always
    networks:
      - hanzo-network
    depends_on:
      - backend
    extra_hosts:
      - "k8s-host:192.168.1.99"
      - "host-postgres:192.168.1.99"
    env_file:
      - ./docker-compose/envs/common-stats.env
    environment:
      STATS__DB_URL: postgresql://blockscout:ceWb1MeLBEeOIfk65gU8EjF8@host-postgres:5432/stats_luxtest?sslmode=disable
      STATS__BLOCKSCOUT_DB_URL: postgresql://blockscout:ceWb1MeLBEeOIfk65gU8EjF8@host-postgres:5432/explorer_luxtest?sslmode=disable
      STATS__CREATE_DATABASE: 'true'
      STATS__RUN_MIGRATIONS: 'true'
      STATS__BLOCKSCOUT_API_URL: http://luxtest-backend:4000
    ports:
      - "8153:8050"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.luxtest-stats.rule=Host(`api-explore-testnet.lux.network`) && PathPrefix(`/api/stats`)"
      - "traefik.http.routers.luxtest-stats.entrypoints=websecure"
      - "traefik.http.routers.luxtest-stats.tls.certresolver=letsencrypt"
      - "traefik.http.routers.luxtest-stats.priority=10"
      - "traefik.http.middlewares.luxtest-stats-strip.stripprefix.prefixes=/api/stats"
      - "traefik.http.routers.luxtest-stats.middlewares=luxtest-stats-strip"
      - "traefik.http.services.luxtest-stats.loadbalancer.server.port=8050"
      - "traefik.docker.network=hanzo-network"

  visualizer:
    image: ghcr.io/luxfi/explorer-visualizer:${VISUALIZER_VERSION:-latest}
    container_name: 'luxtest-visualizer'
    restart: always
    networks:
      - hanzo-network
    env_file:
      - ./docker-compose/envs/common-visualizer.env
    ports:
      - "8150:8050"

  sig-provider:
    image: ghcr.io/luxfi/explorer-sig-provider:${SIG_PROVIDER_VERSION:-latest}
    container_name: 'luxtest-sig-provider'
    restart: always
    networks:
      - hanzo-network
    ports:
      - "8151:8050"
