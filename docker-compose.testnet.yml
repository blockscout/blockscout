version: '3.8'

services:
  backend:
    image: blockscout/blockscout:latest
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout@postgres:5432/blockscout_lux_testnet
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:9650/ext/bc/C/rpc
      ETHEREUM_JSONRPC_WS_URL: ws://host.docker.internal:9650/ext/bc/C/ws
      NETWORK: LUX Testnet
      SUBNETWORK: Testnet
      COIN: LUX
      CHAIN_ID: '96368'
      PORT: 4104
    ports:
      - "4104:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: ghcr.io/hanzoai/sql:latest
    environment:
      POSTGRES_DB: blockscout_lux_testnet
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout
    volumes:
      - postgres_lux_testnet:/var/lib/postgresql/data

volumes:
  postgres_lux_testnet:
