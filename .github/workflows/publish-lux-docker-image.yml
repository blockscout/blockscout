name: Publish Lux Docker image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RELEASE_VERSION: '2.6.1'

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: Build and push Lux Blockscout image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/luxfi/blockscout-lux:latest
            ghcr.io/luxfi/blockscout-lux:v${{ env.RELEASE_VERSION }}
            ghcr.io/luxfi/blockscout-lux:v${{ env.RELEASE_VERSION }}.commit.${{ env.SHORT_SHA }}
          platforms: linux/amd64
          build-args: |
            DECODE_NOT_A_CONTRACT_CALLS=false
            MIXPANEL_URL=
            MIXPANEL_TOKEN=
            AMPLITUDE_URL=
            AMPLITUDE_API_KEY=
            BLOCKSCOUT_VERSION=v${{ env.RELEASE_VERSION }}+commit.${{ env.SHORT_SHA }}
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
