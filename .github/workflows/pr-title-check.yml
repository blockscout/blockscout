name: PR Conventional Commit Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: PR Conventional Commit Validation
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          ALLOWED_TYPES="feat|fix|chore|perf|refactor|docs|doc"
          # Pattern: type(optional-scope): subject  OR  type: subject
          PATTERN="^($ALLOWED_TYPES)(\([^)]+\))?: .+"
          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "PR title is valid: $PR_TITLE"
          else
            echo "ERROR: PR title does not follow Conventional Commits format."
            echo "  Title : '$PR_TITLE'"
            echo "  Expected format : type(scope): subject  OR  type: subject"
            echo "  Allowed types   : feat, fix, chore, perf, refactor, docs, doc"
            echo "  Examples:"
            echo "    feat(api): add new endpoint"
            echo "    fix: handle null pointer"
            exit 1
          fi
